# Worker-local stack: inference worker + its direct dependencies (Ollama, PostgreSQL).
# Requires the gateway stack to be running first (Redis + RabbitMQ on localhost:6379 / :5672).

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: chat-app-worker:latest
    environment:
      RABBITMQ_URL: amqp://guest:guest@host.docker.internal:5672/
      REDIS_URL: redis://host.docker.internal:6379/0
      DATABASE_URL: postgresql+asyncpg://chat:chat@postgres:5432/chat_app
      OLLAMA_URL: http://ollama:11434
      LOG_LEVEL: INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat_app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat_app"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
